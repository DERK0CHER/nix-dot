# FONT
font_size 16
font_family      Fira Mono
bold_font        Fira Mono Bold
italic_font      Fira Mono
bold_italic_font Fira Mono Bold


# PERFORMANCE
repaint_delay 10
input_delay 3
sync_to_monitor yes

# LAYOUT
remember_window_size  yes
initial_window_width  960
initial_window_height 1052
window_padding_width 0

# APPEARANCE
hide_window_decorations yes
background_opacity 0.5
dynamic_background_opacity yes
background            #282828
foreground            #ebdbb2
cursor                #ebdbb2
selection_background  #d65d0e
selection_foreground  #282828
color0                #282828
color8                #928374
color1                #cc241d
color9                #fb4934
color2                #98971a
color10               #b8bb26
color3                #d79921
color11               #fabd2f
color4                #458588
color12               #83a598
color5                #b16286
color13               #d3869b
color6                #689d6a
color14               #8ec07c
color7                #a89984
color15               #ebdbb2

# GENERAL
shell /run/current-system/sw/bin/fish
editor nvim
copy_on_select yes

# MAPPINGS
# map key combine : action1 : action2 : action3 ...
map ctrl+c copy_or_interrupt
map ctrl+v paste_from_clipboard
map ctrl+space>c new_tab
map ctrl+space>w new_os_window
map ctrl+space>k close_tab
map ctrl+space>n next_tab
map ctrl+space>p previous_tab

map ctrl+shift+equal change_font_size current +2.0
map ctrl+shift+plus change_font_size current +2.0
map ctrl+shift+minus change_font_size current -2.0
map ctrl+shift+kp_subtract change_font_size current -2.0

# TAB BAR
tab_bar_min_tabs 2
tab_bar_margin_width 4
tab_bar_style powerline
tab_powerline_style angled
  #OR round, slanted
# tab_title_max_length 12
tab_title_template "{index}"
  #AND {fmt.fg.red}{bell_symbol}{activity_symbol}
tab_bar_background none
active_tab_foreground   #000
active_tab_background   #eee
active_tab_font_style   bold-italic
inactive_tab_foreground #444
inactive_tab_background #999
inactive_tab_font_style normal

# Wallpaper-driven palette (wallust). Last include wins, so this overrides the
# gruvbox colors above. Seeded so the include exists before the first run.
include ~/.cache/wallust/kitty.conf
