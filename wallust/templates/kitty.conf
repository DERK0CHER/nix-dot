# Generated by wallust — do not edit. Included at the end of kitty.conf.
# Background/foreground/body text come from the wallpaper; accents and the dim
# "grey" slot are a fixed orange (never grey), so highlights always pop.
foreground            {{foreground}}
background            {{background}}
selection_foreground  {{background}}
selection_background  #F08A3C
cursor                #F08A3C
url_color             #FFB066

color0  {{background | lighten(0.10)}}
color1  {{color1}}
color2  {{color2}}
color3  {{color3}}
color4  {{color4}}
color5  {{color5}}
color6  {{color6}}
color7  {{foreground | darken(0.15)}}
color8  #F08A3C
color9  {{color9}}
color10 {{color10}}
color11 {{color11}}
color12 {{color12}}
color13 {{color13}}
color14 {{color14}}
color15 {{foreground}}

# Tab bar (overrides the hardcoded values earlier in kitty.conf)
active_tab_foreground   {{background}}
active_tab_background   #F08A3C
inactive_tab_foreground #C56A24
inactive_tab_background {{background | lighten(0.08)}}
