# Generated by wallust — do not edit. Included at the end of kitty.conf.
# Background/foreground come from the wallpaper; accents + the dim slot are
# orange. The 16 ANSI colors are a fixed vivid set so red/green/blue stay
# distinct and readable on any wallpaper (a near-monochrome image otherwise
# collapses them into indistinguishable greys).
foreground            {{foreground}}
background            {{background}}
selection_foreground  {{background}}
selection_background  #F08A3C
cursor                #F08A3C
url_color             #FFB066

color0  {{background | lighten(0.10)}}
color8  #F08A3C

# normal
color1  #E06C75
color2  #98C379
color3  #E5C07B
color4  #61AFEF
color5  #C678DD
color6  #56B6C2
color7  {{foreground | darken(0.15)}}

# bright
color9  #FF7A85
color10 #B5E08A
color11 #F0CE8E
color12 #7CC0FF
color13 #D79EE8
color14 #6FD0DC
color15 {{foreground}}

# Tab bar (overrides the hardcoded values earlier in kitty.conf)
active_tab_foreground   {{background}}
active_tab_background   #F08A3C
inactive_tab_foreground #C56A24
inactive_tab_background {{background | lighten(0.08)}}
