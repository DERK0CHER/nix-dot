[General]
config_version=1.0.3

[Interface]
mainwindow_w=1200
mainwindow_h=800
mainwindow_max=false
theme=follow

[Editor]
style_scheme=auto
style_scheme_light=Adwaita-dark
style_scheme_dark=silktex-gruvbox-dark
font=Monospace 14
line_numbers=true
highlighting=true
textwrapping=true
wordwrapping=true
tabwidth=4
spaces_instof_tabs=false
autoindentation=true

[Preview]
zoom=1.0
autosync=false

[Compile]
typesetter=lualatex
auto_compile=true
timer=1
shellescape=true
synctex=true

[File]
autosaving=true
autosave_timer=10
autoexport=false

[Spelling]
enabled=false
language=en_US

[Snippets]
modifier1=Shift
modifier2=Alt
