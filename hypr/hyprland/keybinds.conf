# ######## Audio ########
bindl = Alt, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = Super, XF86AudioMute, exec, wpctl set-mute @DEFAULT_SOURCE@ toggle
bindl = , XF86AudioMute, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bindl = Super+Shift, M, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 0%
bindle = , XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindle = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-

# ######## Brightness ########
bindle = , XF86MonBrightnessUp, exec, brightnessctl set 5%+
bindle = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ######## Screenshots (hyprshot) ########
# 2 = active window → clipboard
bind = Shift+Alt, 2, exec, hyprshot -m window --clipboard-only --silent
# 3 = region → clipboard
bind = Shift+Alt, 3, exec, hyprshot -m region --clipboard-only --silent
# 4 = region → save to file
bind = Shift+Alt, 4, exec, hyprshot -m region --silent -o ~/Pictures/Screenshots
# Color picker
bind = Super+Shift, C, exec, hyprpicker -a

# ######## Screen recording ########
# Toggle region recording (Super+Alt+R to start, again to stop)
bind = Super+Alt, R, exec, pkill -INT wf-recorder || (mkdir -p ~/Videos/Recordings && wf-recorder -g "$(slurp)" -f ~/Videos/Recordings/$(date '+%Y-%m-%d_%H.%M.%S').mp4)
# Toggle fullscreen recording
bind = Ctrl+Alt, R, exec, pkill -INT wf-recorder || (mkdir -p ~/Videos/Recordings && wf-recorder -f ~/Videos/Recordings/$(date '+%Y-%m-%d_%H.%M.%S').mp4)
# OBS Studio
bind = Super+Alt, O, exec, obs

# ######## Session ########
bind = Super, L, exec, loginctl lock-session
bind = Ctrl+Shift+Alt, Delete, exec, pkill wlogout || wlogout -p layer-shell
bind = Ctrl+Shift+Alt+Super, Delete, exec, systemctl poweroff || loginctl poweroff

# ######## Window management ########
bind = Super, Left, movefocus, l
bind = Super, Right, movefocus, r
bind = Super, Up, movefocus, u
bind = Super, Down, movefocus, d
bind = Super, BracketLeft, movefocus, l
bind = Super, BracketRight, movefocus, r
bindm = Super, mouse:272, movewindow
bindm = Super, mouse:273, resizewindow
bind = Super, Q, killactive
bind = Super+Shift+Alt, Q, exec, hyprctl kill

bind = Super+Shift, Left, movewindow, l
bind = Super+Shift, Right, movewindow, r
bind = Super+Shift, Up, movewindow, u
bind = Super+Shift, Down, movewindow, d
bind = Super+Shift, H, movewindow, l
bind = Super+Shift, L, movewindow, r
bind = Super+Shift, K, movewindow, u
bind = Super+Shift, J, movewindow, d

binde = Super, Minus, layoutmsg, splitratio -0.1
binde = Super, Equal, layoutmsg, splitratio +0.1
binde = Super, Semicolon, layoutmsg, splitratio -0.1
binde = Super, Apostrophe, layoutmsg, splitratio +0.1

bind = Super+Alt, Space, togglefloating
bind = Super+Alt, F, fullscreenstate, 0 3
bind = Super, F, fullscreen, 0
bind = Super, D, fullscreen, 1
bind = Ctrl+Super, Backslash, resizeactive, exact 640 480
bind = Super, P, pin

# ######## Workspace navigation ########
bind = Super, 1, workspace, 1
bind = Super, 2, workspace, 2
bind = Super, 3, workspace, 3
bind = Super, 4, workspace, 4
bind = Super, 5, workspace, 5
bind = Super, 6, workspace, 6
bind = Super, 7, workspace, 7
bind = Super, 8, workspace, 8
bind = Super, 9, workspace, 9
bind = Super, 0, workspace, 10

bind = Super+Shift, 1, movetoworkspace, 1
bind = Super+Shift, 2, movetoworkspace, 2
bind = Super+Shift, 3, movetoworkspace, 3
bind = Super+Shift, 4, movetoworkspace, 4
bind = Super+Shift, 5, movetoworkspace, 5
bind = Super+Shift, 6, movetoworkspace, 6
bind = Super+Shift, 7, movetoworkspace, 7
bind = Super+Shift, 8, movetoworkspace, 8
bind = Super+Shift, 9, movetoworkspace, 9
bind = Super+Shift, 0, movetoworkspace, 10

bind = Super+Alt, 1, movetoworkspacesilent, 1
bind = Super+Alt, 2, movetoworkspacesilent, 2
bind = Super+Alt, 3, movetoworkspacesilent, 3
bind = Super+Alt, 4, movetoworkspacesilent, 4
bind = Super+Alt, 5, movetoworkspacesilent, 5
bind = Super+Alt, 6, movetoworkspacesilent, 6
bind = Super+Alt, 7, movetoworkspacesilent, 7
bind = Super+Alt, 8, movetoworkspacesilent, 8
bind = Super+Alt, 9, movetoworkspacesilent, 9
bind = Super+Alt, 0, movetoworkspacesilent, 10

bind = Super, mouse_up, workspace, +1
bind = Super, mouse_down, workspace, -1
bind = Ctrl+Super, Right, workspace, r+1
bind = Ctrl+Super, Left, workspace, r-1
bind = Ctrl+Super+Alt, Right, workspace, m+1
bind = Ctrl+Super+Alt, Left, workspace, m-1
bind = Super, Page_Down, workspace, +1
bind = Super, Page_Up, workspace, -1
bind = Ctrl+Super, Page_Down, workspace, r+1
bind = Ctrl+Super, Page_Up, workspace, r-1
bind = Ctrl+Super, BracketLeft, workspace, -1
bind = Ctrl+Super, BracketRight, workspace, +1
bind = Ctrl+Super, Up, workspace, r-5
bind = Ctrl+Super, Down, workspace, r+5

bind = Super+Shift, mouse_down, movetoworkspace, r-1
bind = Super+Shift, mouse_up, movetoworkspace, r+1
bind = Super+Alt, mouse_down, movetoworkspace, -1
bind = Super+Alt, mouse_up, movetoworkspace, +1
bind = Ctrl+Super+Shift, Right, movetoworkspace, r+1
bind = Ctrl+Super+Shift, Left, movetoworkspace, r-1

# Special workspace
bind = Super, S, togglespecialworkspace
bind = Super, mouse:275, togglespecialworkspace
bind = Super+Alt, S, movetoworkspacesilent, special
bind = Ctrl+Super+Shift, Up, movetoworkspacesilent, special
bind = Ctrl+Super, S, togglespecialworkspace

bind = Alt, Tab, cyclenext
bind = Alt, Tab, bringactivetotop

# ######## System ########
bindr = Ctrl+Super, R, exec, hyprctl reload && pkill waybar; waybar &

# ######## Media ########
bindl = Super+Shift, N, exec, playerctl next
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPrev, exec, playerctl previous
bindl = Super+Shift, B, exec, playerctl previous
bindl = Super+Shift, P, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPause, exec, playerctl play-pause
bindel = Super+Shift, Comma, exec, playerctl volume 0.03-
bindel = Super+Shift, Period, exec, playerctl volume 0.03+
bind = Super+Shift+Alt, mouse:275, exec, playerctl previous
bind = Super+Shift+Alt, mouse:276, exec, playerctl next

# ######## Apps ########
bind = Super, T, exec, foot
bind = Super, Return, exec, kitty 
# Wofi launcher (toggle: press again to close)
bind = Super, Space, exec, pkill -f '^wofi ' || wofi --show drun
# Clipboard history
bind = Super, V, exec, cliphist list | wofi --dmenu | cliphist decode | wl-copy
bind = Super, Z, exec, zed
bind = Super, C, exec, code
bind = Super, E, exec, nautilus --new-window
bind = Super+Alt, E, exec, thunar
bind = Super, W, exec, firefox
bind = Ctrl+Super, W, exec, firefox
bind = Super, I, exec, XDG_CURRENT_DESKTOP=gnome gnome-control-center
bind = Ctrl+Super, V, exec, pavucontrol
bind = Ctrl+Super+Shift, V, exec, easyeffects
bind = Ctrl+Shift, Escape, exec, gnome-system-monitor

# ######## Notifications ########
bind = Super+Shift, D, exec, dunstctl close-all
bind = Super, grave, exec, dunstctl history-pop

# ######## Remote access ########
# Toggle wayvnc bound to loopback only — reach it via SSH tunnel:
#   ssh -L 5900:127.0.0.1:5900 beba@192.168.10.116
# then point VNC viewer at localhost:5900
bind = Super+Shift, V, exec, pkill wayvnc && notify-send "wayvnc stopped" || (notify-send "wayvnc listening on 127.0.0.1:5900"; wayvnc 127.0.0.1 5900)
