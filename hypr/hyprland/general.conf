# Wallpaper-driven colors ($accent, $accent_bright, $background, $foreground).
# Generated by wallust; seeded so this loads even before the first run.
source = /home/beba/.cache/wallust/hypr-colors.conf

# MONITOR CONFIG
#monitor=,highres,auto,1.423,bitdepth, 10
#monitor=eDP-1,2560x1664@144,auto,2
# monitor=DP-1,1920x1080@300,transform 3,1
monitor = DP-1, 1920x1080@300, 2560x0, 1, transform, 0

# LG 32GP850 (Nano IPS, DisplayHDR 400). Pick ONE — toggle by (un)commenting.
# B: HDR @ 120 Hz, 10-bit. HDMI 2.0 bandwidth-safe, no chroma subsampling.
# DISABLED 2026-06-15 — atomic DRM commits fail on AMD Navi 44 + Hyprland 0.54.3
# (eglDupNativeFenceFDANDROID EGL_BAD_PARAMETER, render queue stalls, SIGABRT).
#monitor = HDMI-A-1, 2560x1440@120, 0x0, 1, bitdepth, 10, cm, hdredid, sdrbrightness, 1.2, sdrsaturation, 0.85
# A: HDR @ 144 Hz, 10-bit. Full refresh but exceeds HDMI 2.0 → chroma subsampled (text fringes).
#monitor = HDMI-A-1, 2560x1440@143.99, 0x0, 1, bitdepth, 10, cm, hdredid, sdrbrightness, 1.2, sdrsaturation, 0.85
# C: Wide-gamut SDR @ 144 Hz. Punchy Nano IPS gamut, but sRGB apps push reds into neon territory.
#monitor = HDMI-A-1, 2560x1440@143.99, 0x0, 1, bitdepth, 10, cm, wide
# D: Plain sRGB @ 144 Hz, 8-bit (current). Original look — safe fallback if anything misbehaves.
monitor = HDMI-A-1, 2560x1440@143.99, 0x0, 1

#monitor=,highres,auto,1.3333,bitdepth, 10
#monitor=,highres,auto,2

# HDMI port: mirror display. To see device name, use `hyprctl monitors`
input {
    kb_layout = us
    kb_options = caps:swapescape
    # kb_options = grp:win_space_toggle
    numlock_by_default = false
    repeat_delay = 250
    repeat_rate = 35

    touchpad {
        tap-to-click = false
        natural_scroll = yes
        disable_while_typing = true
        clickfinger_behavior = true
    }
    special_fallthrough = true
    follow_mouse = 1
}

binds {
    scroll_event_delay = 0
}

gestures {
    workspace_swipe_distance = 700
    workspace_swipe_cancel_ratio = 0.2
    workspace_swipe_min_speed_to_force = 5
    workspace_swipe_direction_lock = true
    workspace_swipe_direction_lock_threshold = 10
    workspace_swipe_create_new = true
}

general {
    gaps_in = 3
    gaps_out = 3
    gaps_workspaces = 50
    border_size = 0

    # Themed by wallust. Invisible while border_size = 0 — bump it to see them.
    col.active_border = $accent $accent_bright 45deg
    col.inactive_border = $background

    resize_on_border = true
    no_focus_fallback = true
    layout = dwindle
    allow_tearing = true # This just allows the `immediate` window rule to work
}

dwindle {
    preserve_split = true
    smart_split = false
    smart_resizing = false
}

decoration {
    rounding = 11

    blur {
        enabled = true
        xray = true
        special = false
        size = 14
        passes = 4
        brightness = 1
        noise = 0.01
        contrast = 1
        popups = true
        popups_ignorealpha = 0.6
    }

    shadow {
        enabled = true
        range = 32
        offset = 0 6
        render_power = 3
        color = rgba(00000045)
    }

    dim_inactive = false
    dim_strength = 0.1
    dim_special = 0
}

animations {
    enabled = true

    bezier = linear, 0, 0, 1, 1
    bezier = md3_standard, 0.2, 0, 0, 1
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = overshot, 0.05, 0.9, 0.1, 1.1
    bezier = hyprnostretch, 0.05, 0.9, 0.1, 1.0
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07
    bezier = easeInOutCirc, 0.85, 0, 0.15, 1
    bezier = easeOutCirc, 0, 0.55, 0.45, 1
    bezier = easeOutExpo, 0.16, 1, 0.3, 1
    bezier = softAcDecel, 0.26, 0.26, 0.15, 1

    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = fadeLayersIn, 1, 2, menu_decel
    animation = fadeLayersOut, 1, 0.5, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
    animation = specialWorkspace, 1, 3, md3_decel, slidevert
}

cursor {
    no_hardware_cursors = true
}

misc {
    # VRR disabled 2026-06-15 — both monitors report "crtc is incapable of vrr"
    # in aquamarine logs, and enabling it caused atomic DRM commit failures on
    # AMD Navi 44 (RX 9060 XT) leading to SIGABRT in CHyprRenderer::renderMonitor.
    vrr = 0
    animate_manual_resizes = false
    animate_mouse_windowdragging = false
    enable_swallow = true
    swallow_regex = (foot|kitty|alacritty|Alacritty)
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    allow_session_lock_restore = true
    initial_workspace_tracking = false
}

ecosystem {
    no_update_news = true
}

