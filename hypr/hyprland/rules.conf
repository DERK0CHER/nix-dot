# ######## Window rules — Hyprland 0.54 syntax ########
# Format: windowrule = RULE [VALUE] filtertype:filtervalue
# Format: layerrule  = RULE [VALUE] namespace_glob
# No commas. Space-separated. Colon for window filters.

workspace = w[tv1], gapsout:0, gapsin:0
workspace = f[1], gapsout:0, gapsin:0

# Tiling
windowrule = tile class:^dev\.warp\.Warp$

# Picture-in-Picture
windowrule = float           title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = keep_aspect_ratio title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = move 73% 72%   title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = size 25%       title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$
windowrule = pin             title:^([Pp]icture[-\s]?[Ii]n[-\s]?[Pp]icture)(.*)$

# Dialog windows
windowrule = float  title:^(Open File)(.*)$
windowrule = float  title:^(Select a File)(.*)$
windowrule = float  title:^(Choose wallpaper)(.*)$
windowrule = float  title:^(Open Folder)(.*)$
windowrule = float  title:^(Save As)(.*)$
windowrule = float  title:^(Library)(.*)$
windowrule = float  title:^(File Upload)(.*)$
windowrule = center title:^(Open File)(.*)$
windowrule = center title:^(Select a File)(.*)$
windowrule = center title:^(Choose wallpaper)(.*)$
windowrule = center title:^(Open Folder)(.*)$
windowrule = center title:^(Save As)(.*)$
windowrule = center title:^(Library)(.*)$
windowrule = center title:^(File Upload)(.*)$

# Tearing (games / wine)
windowrule = immediate title:.*\.exe
windowrule = immediate class:^(steam_app_)

# No shadow on tiled windows
windowrule = no_shadow floating:0

# Solo tiled window on a workspace: drop rounding so it feels fullscreen
windowrule = rounding 0, onworkspace:w[tv1]

# ######## Workspace rules ########
workspace = special:special, gapsout:30

# ######## Layer rules — Hyprland 0.54 syntax ########
# Format: layerrule = RULE [VALUE] NAMESPACE_GLOB  (space, no comma)

layerrule = xray .*
layerrule = animation off selection
layerrule = animation off hyprpicker
layerrule = animation off anyrun

# Waybar
layerrule = blur             waybar
layerrule = ignore_alpha 0.3 waybar

# Notifications (dunst)
layerrule = blur             notifications
layerrule = ignore_alpha 0.5 notifications

# Wofi / launcher
layerrule = blur             launcher
layerrule = ignore_alpha 0.3 launcher

# Lock screen
layerrule = blur logout_dialog

# GTK layer shell popovers
layerrule = blur             gtk-layer-shell
layerrule = ignore_alpha 0.0 gtk-layer-shell
