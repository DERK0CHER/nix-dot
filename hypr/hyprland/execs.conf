# Wallpaper
exec-once = hyprpaper

# Bar & notifications
exec-once = waybar
exec-once = dunst

# Gamma / night light
exec-once = /usr/lib/geoclue-2.0/demos/agent & gammastep

# Input method
exec-once = fcitx5

# Core components (authentication, lock screen)
exec-once = gnome-keyring-daemon --start --components=secrets
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1 || /usr/libexec/polkit-gnome-authentication-agent-1
exec-once = hypridle
exec-once = dbus-update-activation-environment --all
exec-once = sleep 1 && dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = hyprpm reload

# Audio
exec-once = easyeffects --gapplication-service

# Clipboard history
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Cursor
exec-once = hyprctl setcursor Adwaita 24

# GTK theming
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita'
exec-once = gsettings set org.gnome.desktop.interface icon-theme 'Adwaita'
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Adwaita'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 24
exec-once = gsettings set org.gnome.desktop.interface monospace-font-name 'Fira Mono 13'

# Ensure recordings directory exists
exec-once = mkdir -p ~/Videos/Recordings ~/Pictures/Screenshots
